# SPDX-FileCopyrightText: 2025 The Linux Foundation

# Action test/validation workflow
name: 'Test GitHub Action 🧪'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, edited, synchronize]
    branches: ['main']
  push:
    branches: ['main']

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

# Parameters used during workflow test/development
env:
  CHARTS_SOURCE_DIR: 'charts'
  CHART_ARTIFACT_NAME: 'helm-charts'
  CHARTMUSEUM_STORAGE_DIR: './chartmuseum-storage'
  CHARTMUSEUM_PORT: '8080'
  CHART_REPOSITORY: 'lfreleng-actions/test-makefile-helm-chart'
  CHARTS_BUILD_DIR: 'test-makefile-helm-chart'

jobs:
  build:
    name: 'Build'
    runs-on: 'ubuntu-latest'
    outputs:
      charts_build_dir: "${{ env.CHARTS_BUILD_DIR }}"
      chart_artifact_name: "${{ env.CHART_ARTIFACT_NAME }}"
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Setup Helm'
        # yamllint disable-line rule:line-length
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0

      - name: 'Run make'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/make-action@e07201ee8e3d1f34800f1c63f58415624a8c054c  # v0.1.3
        with:
          repository: 'lfreleng-actions/test-makefile-helm-chart'
          path: 'test-makefile-helm-chart'
          make_args: '-C test-makefile-helm-chart'

      - name: 'Upload Helm Charts as artefacts'
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: "${{ env.CHART_ARTIFACT_NAME }}"
          path: "${{ env.CHARTS_BUILD_DIR }}/*.tgz"

  github-publish:
    name: 'Publish [GitHub]'
    runs-on: 'ubuntu-latest'
    needs:
      - build
    permissions:
      contents: read
      packages: write
    timeout-minutes: 3
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Download Helm Charts'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: "${{ needs.build.outputs.chart_artifact_name }}"
          path: "${{ needs.build.outputs.charts_build_dir }}"

      - uses: ./
        with:
          registry: 'ghcr.io'
          username: "${{ github.actor }}"
          password: "${{ github.token }}"
          charts_path: "${{ needs.build.outputs.charts_build_dir }}"

  dockerhub-publish:
    name: 'Publish [DockerHub]'
    runs-on: 'ubuntu-latest'
    needs:
      - build
    permissions:
      contents: read
    timeout-minutes: 3
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Download Helm Charts'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: "${{ needs.build.outputs.chart_artifact_name }}"
          path: "${{ needs.build.outputs.charts_build_dir }}"

      - uses: ./
        with:
          registry: 'docker.io'
          # Prefer canonical DOCKERHUB_USER; fall back to
          # DOCKERHUB_USERNAME for backwards compatibility
          # yamllint disable-line rule:line-length
          username: "${{ vars.DOCKERHUB_USER || vars.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_PASSWORD }}"
          charts_path: "${{ needs.build.outputs.charts_build_dir }}"
          # yamllint disable-line rule:line-length
          organisation: "${{ vars.DOCKERHUB_USER || vars.DOCKERHUB_USERNAME }}"
