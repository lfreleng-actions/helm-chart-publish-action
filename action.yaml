# helm-chart-publish-action
name: '☸️ Helm Chart Publisher'
description: 'Publishes Helm Charts to an OCI container repository'

inputs:
  # Mandatory
  username:
    description: 'Username for the repository'
    required: true
  password:
    description: 'Password for the repository'
    required: true
  # Optional
  registry:
    description: 'Destination container registry'
    required: false
    # Defaults to Dockerhub when not specified
    default: 'docker.io'
  organisation:
    description: 'Organization/namespace in the container registry'
    required: false
    # Defaults to the GitHub repository owner when not specified
    default: '${{ github.repository_owner }}'
  charts_path:
    description: 'Path to the Helm charts directory'
    required: false
    default: './chartstorage'
  permit_fail:
    description: 'Allow action to fail without failing the workflow'
    required: false
    default: 'false'
    # This is a boolean input, but GitHub Actions does not support
    # boolean types directly. We treat it as a string and handle it
    # in the action logic
  show_charts:
    description: 'Show/list published Helm charts in registry after publishing'
    required: false
    default: 'false'
    # This is a boolean input, but GitHub Actions does not support
    # boolean types directly. We treat it as a string and handle it
    # in the action logic

outputs:
  published_files:
    description: "List of successfully published files"
    value: ${{ steps.publish.outputs.published_files }}
  failed_files:
    description: "List of files that failed to publish"
    value: ${{ steps.publish.outputs.failed_files }}
  success_count:
    description: "Number of files successfully published"
    value: ${{ steps.publish.outputs.success_count }}
  failure_count:
    description: "Number of files that failed publishing"
    value: ${{ steps.publish.outputs.failure_count }}

runs:
  using: "composite"
  steps:
    - name: "Validate action inputs"
      id: validate
      shell: bash
      run: |
        # Validate action inputs
        if [ -z "${{ inputs.username }}" ]; then
          echo "Error: username input is required ❌"
          exit 1
        elif [ -z "${{ inputs.password }}" ]; then
          echo "Error: password input is required ❌"
          exit 1
        elif [ ! -d "${{ inputs.charts_path }}" ]; then
          echo "Error: charts_path directory invalid ❌"
          exit 1
        fi
        echo "Action inputs validated ✅"

        # Check for helm command
        if ! command -v helm >/dev/null 2>&1; then
          echo "Error: helm command not found in PATH ❌"
          exit 1
        fi
        # Output helm version
        helm_version=$(helm version --short 2>/dev/null)
        echo "Helm version: $helm_version"
        # Check for minimum version 3.7.0 (OCI support built-in)
        min_version=3.7.0
        current_version=$(helm version --short | \
          sed -E 's/v([0-9.]+).*/\1/')
        if [ -z "$current_version" ]; then
          echo "Error: Could not determine Helm version ❌"
          exit 1
        fi
        # Fail if current_version is less than min_version
        if [ "$(printf '%s\n' "$min_version" "$current_version" |\
          sort -V | head -n1)" = "$min_version" ]; then
          :  # OK
        else
          echo "Error: Helm version $min_version or higher required ❌"
          exit 1
        fi
        echo "Helm push and OCI registries supported ✅"
        echo "Organization/Namespace: ${{ inputs.organisation }}"

    # yamllint disable-line rule:line-length
    - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
      with:
        registry: "${{ inputs.registry }}"
        username: "${{ inputs.username }}"
        password: "${{ inputs.password }}"

    - name: 'Publish Helm Charts'
      id: publish
      shell: bash
      # yamllint disable rule:line-length
      run: |
        # Package and push helm charts to DockerHub

        set -euo pipefail

        PERMIT_FAIL=$(echo "${{ inputs.permit_fail }}" | \
          tr '[:upper:]' '[:lower:]')

        # Temporary file handling and cleanup
        published_files=$(mktemp -t published_files.XXXXXX)
        failed_files=$(mktemp -t failed_files.XXXXXX)
        function cleanup {
          rm -f "$published_files" "$failed_files"
        }
        trap 'cleanup' EXIT SIGINT

        echo "Publishing Helm Charts to registry: ${{ inputs.registry }} ☸️"

        shopt -s nullglob  # Since we specify bash as shell, this is fine
        # Use find to handle spaces in filenames robustly
        chart_files_found=$(find "${{ inputs.charts_path }}" \
          -maxdepth 1 -name '*.tgz' | wc -l)

        if [ "$chart_files_found" -eq 0 ]; then
          echo "No Helm charts (.tgz) found in ${{ inputs.charts_path }} ⚠️"
          echo "success_count=0" >> "$GITHUB_OUTPUT"
          echo "failure_count=0" >> "$GITHUB_OUTPUT"
          echo "published_files=" >> "$GITHUB_OUTPUT"
          echo "failed_files=" >> "$GITHUB_OUTPUT"
          echo "Container Registry: ${{ inputs.registry }}" \
            >> "$GITHUB_STEP_SUMMARY"
          echo "No charts found to publish ⚠️" >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        find "${{ inputs.charts_path }}" -maxdepth 1 -name '*.tgz' \
          -print0 | \
        {
          # Define counters
          success_count=0
          failure_count=0

          while IFS= read -r -d '' file; do
            echo "Publishing chart file: $file"
            # Extract chart name (repo) using helm show chart
            chart_repo=$(helm show chart "$file" 2>/dev/null | \
              awk -F': ' '/^name:/ {print $2}' | head -n1)
            if [ -z "$chart_repo" ]; then
              echo "Failed to extract chart name from $file ❌"
              echo "$file" >> "$failed_files"
              failure_count=$((failure_count + 1))
              continue
            fi

            set +e  # Don't exit on individual helm push failure, process all
            # Push the chart to the registry using the org as repo namespace
            if helm push "$file" \
              "oci://${{ inputs.registry }}/${{ inputs.organisation }}/${chart_repo}"
            then
              echo "Successfully published: $file ✅"
              echo "$file" >> "$published_files"
              success_count=$((success_count + 1))
            else
              echo "Failed to publish: $file ❌"
              echo "$file" >> "$failed_files"
              failure_count=$((failure_count + 1))
            fi
            set -e  # Re-enable exit on error
          done

          # Set outputs for the action (multi-line, one file per line)
          echo "published_files<<EOF" >> "$GITHUB_OUTPUT"
          cat "$published_files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "failed_files<<EOF" >> "$GITHUB_OUTPUT"
          cat "$failed_files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "success_count=$success_count" >> "$GITHUB_OUTPUT"
          echo "failure_count=$failure_count" >> "$GITHUB_OUTPUT"

          # Summary output
          echo '## ☸️ Helm Chart Publisher' >> "$GITHUB_STEP_SUMMARY"
          echo "Container registry: ${{ inputs.registry }}" \
            >> "$GITHUB_STEP_SUMMARY"
          if [ "$success_count" -gt '0' ]; then
            echo "Charts published: $success_count ✅" >> "$GITHUB_STEP_SUMMARY"
            echo "Charts published: $success_count ✅"
          fi
          if [ "$failure_count" -gt '0' ]; then
            echo "Publishing failures: $failure_count ❌" \
              >> "$GITHUB_STEP_SUMMARY"
            echo "Publishing failures: $failure_count ❌"
            if [ "f$PERMIT_FAIL" != "ftrue" ]; then
              echo "Action failed due to publishing errors ❌"
              exit 1
            else
              echo "Some files failed to publish to the registry ⚠️"
            fi
          fi
        }

    - name: 'Show/list Helm Charts in Registry [Optional]'
      if: ${{ inputs.show_charts == 'true' }}
      shell: bash
      run: |
        # Show/list Helm Charts in Registry

        # Wait for registry to propagate changes
        echo "Waiting for registry to propagate changes... ⏳"
        sleep 60

        echo "Listing published Helm Charts in registry: ${{ inputs.registry }} 📋"

        # Get the list of successfully published charts from previous step
        if [ -n "${{ steps.publish.outputs.published_files }}" ]; then
          echo "${{ steps.publish.outputs.published_files }}" | \
            while read -r file; do
            if [ -n "$file" ]; then
              # Extract chart name from the file
              chart_repo=$(helm show chart "$file" 2>/dev/null | \
                awk -F': ' '/^name:/ {print $2}' | head -n1)
              if [ -n "$chart_repo" ]; then
                echo "📦 Checking chart: $chart_repo"
                # Try to show the chart information from the registry
                set +e  # Don't exit on error for individual chart queries
                if helm show chart \
                  "oci://${{ inputs.registry }}/${{ inputs.organisation }}/${chart_repo}" \
                  2>/dev/null; then
                  echo "✅ Chart $chart_repo is available in registry"
                else
                  echo "⚠️  Could not retrieve chart $chart_repo from registry" \
                    "(may take time to propagate)"
                fi
                set -e
                echo "---"
              fi
            fi
          done
        else
          echo "No charts were successfully published ⚠️"
        fi
